<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Dejanos tu opinion - Yerco Dietetica</title>
    <link rel="icon" href="img/LOGOS_Mesa%20de%20trabajo%201%20copia%2025.jpg.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Source Sans 3',sans-serif;background:#f5f0e8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
        .card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,0.08);max-width:440px;width:100%;overflow:hidden}
        .card-header{background:#2d5a3a;padding:2rem 1.5rem;text-align:center;color:#fff}
        .card-header img{height:50px;margin-bottom:0.75rem;border-radius:6px}
        .card-header h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:0.25rem}
        .card-header p{font-size:0.9rem;opacity:0.85}
        .card-body{padding:1.75rem 1.5rem}
        .field{margin-bottom:1.25rem}
        .field label{display:block;font-size:0.85rem;font-weight:600;color:#333;margin-bottom:0.4rem}
        .field input,.field textarea{width:100%;padding:0.7rem 1rem;border:2px solid #e0d8cc;border-radius:10px;font-size:1rem;font-family:inherit;transition:border-color 0.2s;outline:none;background:#faf8f4}
        .field input:focus,.field textarea:focus{border-color:#2d5a3a}
        .field textarea{resize:vertical;min-height:90px}
        .stars{display:flex;gap:6px;justify-content:center;margin:1rem 0 1.5rem}
        .stars span{font-size:2.2rem;cursor:pointer;color:#d4cfc5;transition:color 0.15s,transform 0.15s;user-select:none}
        .stars span:hover,.stars span.active{color:#e6a817;transform:scale(1.15)}
        .stars span.active{text-shadow:0 2px 8px rgba(230,168,23,0.3)}
        .btn-submit{width:100%;padding:0.85rem;background:#2d5a3a;color:#fff;border:none;border-radius:12px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:background 0.2s,transform 0.1s}
        .btn-submit:hover{background:#245a30}
        .btn-submit:active{transform:scale(0.98)}
        .btn-submit:disabled{background:#999;cursor:not-allowed}
        .success{display:none;text-align:center;padding:2.5rem 1.5rem}
        .success .check{font-size:3.5rem;margin-bottom:1rem}
        .success h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:#2d5a3a;margin-bottom:0.5rem}
        .success p{color:#666;font-size:0.95rem;line-height:1.5}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:0.75rem 1.5rem;border-radius:10px;font-size:0.9rem;display:none;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
        .toast.show{display:block;animation:fadeIn 0.3s}
        @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <img src="img/logo-yerco-light.png" alt="Yerco">
            <h1>Tu opinion nos importa</h1>
            <p>Contanos como fue tu experiencia</p>
        </div>
        <div class="card-body" id="formArea">
            <div class="field">
                <label>Tu nombre</label>
                <input type="text" id="rNombre" placeholder="Ej: Maria Garcia" maxlength="60">
            </div>
            <label style="display:block;font-size:0.85rem;font-weight:600;color:#333;text-align:center">Como calificarias tu experiencia?</label>
            <div class="stars" id="starsContainer">
                <span onclick="setStars(1)">&#9733;</span>
                <span onclick="setStars(2)">&#9733;</span>
                <span onclick="setStars(3)">&#9733;</span>
                <span onclick="setStars(4)">&#9733;</span>
                <span onclick="setStars(5)">&#9733;</span>
            </div>
            <div class="field">
                <label>Tu comentario</label>
                <textarea id="rComentario" placeholder="Que te parecio? Que podemos mejorar?" maxlength="500"></textarea>
            </div>
            <button class="btn-submit" id="submitBtn" onclick="submitReview()">Enviar opinion</button>
        </div>
        <div class="success" id="successArea">
            <div class="check">&#10003;</div>
            <h2>Gracias por tu opinion!</h2>
            <p>Tu comentario nos ayuda a mejorar cada dia. Nos encanta saber que pensas.</p>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        let selectedStars=0;
        function setStars(n){selectedStars=n;document.querySelectorAll('#starsContainer span').forEach((s,i)=>{s.classList.toggle('active',i<n);});}
        function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
        async function submitReview(){
            const nombre=document.getElementById('rNombre').value.trim();
            const comentario=document.getElementById('rComentario').value.trim();
            if(!nombre){showToast('Escribi tu nombre');return;}
            if(!selectedStars){showToast('Selecciona las estrellas');return;}
            if(!comentario){showToast('Escribi un comentario');return;}
            const btn=document.getElementById('submitBtn');
            btn.disabled=true;btn.textContent='Enviando...';
            try{
                await db.collection('resenas').add({
                    nombre:nombre,
                    estrellas:selectedStars,
                    comentario:comentario,
                    fecha:new Date(),
                    visible:true
                });
                document.getElementById('formArea').style.display='none';
                document.getElementById('successArea').style.display='block';
            }catch(e){
                showToast('Error al enviar, intenta de nuevo');
                btn.disabled=false;btn.textContent='Enviar opinion';
            }
        }
    </script>
</body>
</html>
